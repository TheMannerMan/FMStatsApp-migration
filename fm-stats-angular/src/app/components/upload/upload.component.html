<div class="upload-container">
  <h1>FM Stats</h1>
  <p>Upload your Football Manager HTML export to view player statistics.</p>

  <div
    class="drop-zone"
    [class.drag-over]="isDragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <i class="pi pi-upload drop-icon"></i>
    <p class="drop-text">
      @if (selectedFile) {
        <strong>{{ selectedFile.name }}</strong>
      } @else {
        Drag & drop your FM export here
      }
    </p>
    <p class="drop-hint">or</p>
    <p-button
      label="Browse file"
      [outlined]="true"
      size="small"
      (onClick)="fileInput.click()"
      [disabled]="isLoading"
    />
    <input
      #fileInput
      type="file"
      accept=".html"
      (change)="onFileSelected($event)"
      [disabled]="isLoading"
      style="display: none"
    />
  </div>

  <p-button
    label="Upload"
    icon="pi pi-arrow-right"
    iconPos="right"
    [loading]="isLoading"
    [disabled]="!selectedFile || isLoading"
    (onClick)="onUpload()"
    styleClass="upload-btn"
  />

  @if (errorMessage) {
    <p-message severity="error" [text]="errorMessage" styleClass="error-msg" />
  }
</div>
