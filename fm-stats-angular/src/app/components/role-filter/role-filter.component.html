<div class="role-filter">
  <h3>Filter Role Columns</h3>

  <div *ngFor="let group of roleGroups()" class="position-group">
    <label class="group-label">
      <input
        type="checkbox"
        [checked]="group.allChecked"
        [indeterminate]="group.indeterminate"
        (change)="onGroupChange(group.groupName, $event)"
      />
      <strong>{{ group.groupName }}</strong>
    </label>

    <div class="role-list">
      <label *ngFor="let role of group.roles" class="role-label">
        <input
          type="checkbox"
          [checked]="playerService.activeRoles().has(role.shortRoleName)"
          (change)="onRoleChange(role.shortRoleName, $event)"
        />
        {{ role.shortRoleName }}
      </label>
    </div>
  </div>
</div>
